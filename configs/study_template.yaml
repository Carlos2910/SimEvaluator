study_name: study_name_here

study:
  name: study_name_here
  folder: studies/study_name_here

experimental:
  folder: datasets/experimental
  pattern: "{case}.txt"
  columns:
    x: diameter
    y: force

simulation:
  folder: datasets/simulations
  datasets:
    simulation_dataset_1:
      folder: simulation_dataset_1
    simulation_dataset_2:
      folder: simulation_dataset_2
  filename_regex: "^sim-(.+?)-Node(\\d+)(.*)?\\..+$"
  displacement_column: disp
  force_columns:
    - RF1
    - RF2
    - RF3

channels:
  RF1:
    transform: abs
  RF2:
    transform: abs
  RF3:
    transform: abs
  total_force:
    formula: vector_magnitude
    columns:
      - RF1
      - RF2
      - RF3

alignment:
  method: sim_min_diameter_to_experimental_min_diameter
  nominal_starting_diameters: {}

outliers:
  method: rolling_hampel
  window: 41
  window_diameter_span: 0.10
  min_window_points: 21
  sigma: 6.0
  min_relative_prominence: 0.03
  exclusion_threshold_ratio: 3.0
  split_by_branch: true

metrics:
  comparison_grid: auto

interpolation:
  filter_window: 7

branches:
  split_at: minimum_x
  include_split_point_in_both: true

selection:
  metric_variant: outliers_excluded
  channel: total_force
  rank_by:
    - RMSE
    - sMAPE
    - NRMSE_percent

comparison:
  enabled: auto
  output_folder: comparison

selected_plot:
  enabled: auto
  source: selected_best_simulations_total_force.csv
  channel: total_force
  metric_variant: outliers_excluded
  simulation_data:
    - smoothed
  split_branches: false
  branches:
    - loading
    - unloading
  output_folder: selected_plots
  figure:
    figsize: [10, 6]
    linewidth: 3
    experimental_linestyle: "-"
    simulation_linestyle: "--"
    simulation_linestyles:
      raw: ":"
      cleaned: "--"
      smoothed: "-."
      interpolated: "--"
    simulation_alphas:
      raw: 0.35
      cleaned: 0.75
      smoothed: 0.95
      interpolated: 0.90
    dpi: 300
    colors: {}

# Optional: per-case metadata keyed by case_token (everything between sim- and -NodeN).
# If this section is absent, case_token is used directly as the case_key and
# colors are auto-assigned from the matplotlib color cycle.
#
# cases:
#   W6-AP:
#     experimental_case: W6-AP   # which experimental file to compare against
#     color: "#dc845a"           # line color in selected plots
#     order: 10                  # sort order within a figure (lower = earlier)
#   W9-AP:
#     experimental_case: W9-AP
#     color: "#8497bb"
#     order: 20
#   # Cross-naming example: step2 token maps to an existing experimental file
#   W6_100-150:
#     experimental_case: W6-AP
#     color: "#dc845a"
#     order: 10

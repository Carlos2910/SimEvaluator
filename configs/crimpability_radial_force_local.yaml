study_name: crimpability_radial_force

study:
  name: crimpability_radial_force
  folder: studies/crimpability_radial_force

experimental:
  folder: datasets/experimental
  pattern: "{case}.txt"
  columns:
    x: diameter
    y: force

simulation:
  folder: datasets/simulations
  datasets:
    sim_raw_data_revision:
      folder: sim_raw_data_revision
    sim_raw_data2:
      folder: sim_raw_data2
  filename_regex: "^sim-(W\\d+)-(AP|CEEP)-Node(\\d+)\\.xlsx$"
  displacement_column: disp
  force_columns:
    - RF1
    - RF2
    - RF3

channels:
  RF1:
    transform: abs
  RF2:
    transform: abs
  RF3:
    transform: abs
  total_force:
    formula: vector_magnitude
    columns:
      - RF1
      - RF2
      - RF3

alignment:
  method: sim_min_diameter_to_experimental_min_diameter
  nominal_starting_diameters:
    W6-AP: 5.97
    W6-CEEP: 5.66
    W9-AP: 6.10
    W9-CEEP: 6.00
    W12-AP: 6.175
    W12-CEEP: 6.00

outliers:
  method: rolling_hampel
  window: 41
  sigma: 6.0
  min_relative_prominence: 0.03

branches:
  split_at: minimum_x
  include_split_point_in_both: true

selection:
  metric_variant: outliers_excluded_interpolated
  channel: total_force
  rank_by:
    - RMSE
    - sMAPE
    - NRMSE_percent

comparison:
  enabled: auto
  output_folder: comparison

selected_plot:
  enabled: auto
  source: selected_best_simulations_total_force.csv
  channel: total_force
  metric_variant: outliers_excluded_interpolated
  branches:
    - loading
    - unloading
  output_folder: selected_plots
  figure:
    figsize: [10, 6]
    linewidth: 3
    experimental_linestyle: "-"
    simulation_linestyle: "--"
    dpi: 300
    colors:
      "6": "#4C78A8"
      "9": "#F58518"
      "12": "#54A24B"
